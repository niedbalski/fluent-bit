name: 'Commit Message Check'
on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize
  push:
    branches:
      - master

jobs:
  check-commit-message:
    name: Check Commit Message
    runs-on: ubuntu-latest
    steps:
      - name: Get PR Commits
        id: 'get-pr-commits'
        uses: tim-actions/get-pr-commits@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Subject Line Length
        uses: tim-actions/commit-message-checker-with-regex@v1.0.0
        with:
          commits: ${{ steps.get-pr-commits.outputs.commits }}
          pattern: '[a-z\-]+\:[ ]{0,1}[a-z]+$'
          error: 'Commit message subject should be formatted as: "prefix: lowercase description", see https://github.com/fluent/fluent-bit/blob/master/CONTRIBUTING.md#commit-changes'